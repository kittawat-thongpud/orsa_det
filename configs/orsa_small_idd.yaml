# ORSA-Det Small on IDD — RTX 4070 Laptop (8GB) profile
# NASA-clean: every number/mode is a named, config-driven param. Code holds no
# magic numbers; dataclass defaults are the fallback, this file the override.
dataset:
  format: "voc"
  root: "D:/Personal/work/Kaset/AJ_OAT/detection_models/IDD_Detection"
  class_map: "configs/idd_classes.json"
  train_split: "train.txt"
  val_split: "val.txt"
  num_classes: 15
  img_size: 512          # 512 for ablation; 640 for final runs

model:
  scale: "small"         # nano | small | base
  aux_query_groups: 1    # Group-DETR aux (train-only)
  use_aux_dense: true    # TAL dense aux (train-only)
  use_ste: true
  pretrained_backbone: "yolo"   # yolo (warm-start CSPBackbone from YOLOv8s COCO, ~97.5%) | none.
                                # Source auto-picked by scale: nano->v8n, small->v8s, base->v8m.

loss:
  lambda_surv: 1.0
  lambda_sparse: 0.001
  lambda_dense: 1.0

# ---- augmentation (orsa.data.AugConfig) ------------------------------------
augment:
  hflip_p: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  mosaic_p: 1.0            # 4-image mosaic (occlusion + scale diversity)
  mixup_p: 0.1             # 2-image blend
  mosaic_center_lo: 0.5
  mosaic_center_hi: 1.5
  mixup_beta: 8.0
  min_box_size: 2.0
  pad_color: 114

# ---- optimizer (orsa.engine.OptimConfig) -----------------------------------
optimizer:
  name: "adamw"           # adamw | sgd | muon_hybrid (phase A = adamw bring-up)
  lr: 0.0002
  weight_decay: 0.0001
  adamw_beta1: 0.9
  adamw_beta2: 0.999
  adamw_eps: 1.0e-8
  # muon_hybrid knobs (used when name == muon_hybrid):
  muon_lr_mult: 100.0
  muon_momentum: 0.95
  muon_nesterov: true
  muon_ns_steps: 5
  hybrid_sgd_lr_mult: 5.0
  hybrid_sgd_momentum: 0.9
  hybrid_sgd_nesterov: true
  ns_a: 3.4445
  ns_b: -4.7750
  ns_c: 2.0315
  ns_eps: 1.0e-7

# ---- lr schedule (orsa.engine.SchedConfig) ---------------------------------
schedule:
  warmup_ratio: 0.05
  warmup_max_steps: 1000
  cosine_min_ratio: 0.01

# ---- EMA (orsa.engine.EMAConfig) -------------------------------------------
ema:
  enabled: true
  decay: 0.9998
  tau: 2000.0

train:
  device: "cuda"
  epochs: 100
  batch_size: 4
  accum: 8               # effective batch = 32
  grad_clip: 1.0
  amp_dtype: "bf16"
  workers: 4
  eval_every: 5

run:
  dir: "runs/orsa_small_idd"
  name: "orsa_small_idd"
